<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brainrot Case Clicker</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
</head>
<body>
    <div id="notification-container"></div>

    <div id="auth-container" class="box shadow">
        <h1 class="logo">BRAINROT <span>CASES</span></h1>
        
        <div id="step-choice">
            <button class="btn main-btn" onclick="showAuth('login')">ВОЙТИ</button>
            <button class="btn sub-btn" onclick="showAuth('reg')">РЕГИСТРАЦИЯ</button>
        </div>

        <div id="step-form" style="display:none;">
            <input type="email" id="user_email" placeholder="Твой Email">
            <input type="password" id="user_password" placeholder="Пароль (мин. 8 знаков)">
            <button id="btn-send-otp" class="btn main-btn" onclick="sendOTP()">ПОЛУЧИТЬ КОД</button>
            <button id="btn-login" class="btn main-btn" style="display:none;" onclick="login()">ВОЙТИ В АККАУНТ</button>
            <p class="link-back" onclick="showAuth('choice')">Назад</p>
        </div>

        <div id="step-code" style="display:none;">
            <input type="number" id="otp_input" placeholder="Код из письма">
            <button class="btn main-btn" onclick="register()">ПОДТВЕРДИТЬ</button>
        </div>
    </div>

    <div id="game-ui" style="display:none;">
        <div class="top-bar shadow">
            <div class="balance">💰 <span id="p-balance">0</span></div>
            <nav class="tabs">
                <button onclick="switchTab('cases')">КЕЙСЫ</button>
                <button onclick="switchTab('inv')">ИНВЕНТАРЬ</button>
                <button class="logout" onclick="location.reload()">ВЫХОД</button>
            </nav>
        </div>

        <div id="tab-cases" class="tab-content">
            <div class="case-card box">
                <div id="case-display" class="display-area">
                    <img src="https://raw.githubusercontent.com/marons/magic-login/main/Drops/TacoBlock.png" width="130">
                </div>
                <button class="btn open-btn" onclick="openCase()">ОТКРЫТЬ (50$)</button>
            </div>
        </div>

        <div id="tab-inv" class="tab-content" style="display:none;">
            <h2 style="text-align:center;">Твои предметы</h2>
            <div id="inventory-list" class="inv-grid"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>

        <nav class="tabs">
            <button onclick="switchTab('cases')">Кейсы</button>
            <button onclick="switchTab('inv')">Инвентарь</button>
            <button onclick="logout()">Выход</button>
        </nav>

        <div id="tab-cases" class="tab box">
            <h2>Баланс: <span id="p-balance">0</span>$</h2>
            <div id="case-display" class="case-box">
                <p>Кликни, чтобы открыть (50$)</p>
            </div>
            <button class="btn open-btn" onclick="openCase()">ОТКРЫТЬ КЕЙС</button>
            
            <div id="drops-feed">
                </div>
        </div>

        <div id="tab-inv" class="tab box" style="display:none;">
            <h2>Твой инвентарь</h2>
            <div id="inventory-list" class="grid">
                </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>

                    <button class="main-btn" onclick="register()">ПОДТВЕРДИТЬ</button>
                </div>
            </div>

            <div id="game-ui" style="display:none;">
                <nav>
                    <button onclick="switchTab('cases')">КЕЙСЫ</button>
                    <button onclick="switchTab('profile')">ПРОФИЛЬ</button>
                    <button onclick="switchTab('support')">САППОРТ</button>
                    <button onclick="logout()" class="logout-btn">ВЫХОД</button>
                </nav>

                <div id="tab-cases" class="tab">
                    <div id="case-display">🎁</div>
                    <button class="main-btn open-btn" onclick="openCase()">ОТКРЫТЬ ЗА 50$</button>
                </div>

                <div id="tab-profile" class="tab" style="display:none;">
                    <div class="balance-card">БАЛАНС: <span id="p-balance">0</span>$</div>
                    <div id="inventory-list"></div>
                </div>

                <div id="tab-support" class="tab" style="display:none;">
                    <h3 class="title">ПОДДЕРЖКА</h3>
                    <textarea id="support-msg" placeholder="Опишите проблему..."></textarea>
                    <button class="main-btn" onclick="sendSupport()">ОТПРАВИТЬ</button>
                </div>
            </div>
        </div>

        <div class="live-section">
            <div class="live-board-container">
                <div class="live-title"><span class="dot"></span> LIVE DROPS</div>
                <div id="drops-feed"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
