<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magic Cases</title>
    <link rel="stylesheet" href="style.css">
    
    <style>
        .page { text-align: center; width: 100%; max-width: 1400px; margin: 0 auto; }
        
        .roulette-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: auto;
            margin: 50px auto;
        }

        .roulette-wrapper {
            position: relative;
            width: 100%;
            max-width: 900px; /* Ширина корпуса рулетки */
            height: 140px;
            background: #111122;
            border: 2px solid #2a2a45;
            border-radius: 20px;
            overflow: hidden; /* Прячем все, что не влазит */
            box-shadow: inset 0 0 50px rgba(0,0,0,0.5);
        }

        .tape {
            display: flex;
            align-items: center;
            position: absolute;
            left: 0;
            height: 100%;
            will-change: transform;
        }

        .roulette-item {
            min-width: 120px;
            height: 120px;
            margin: 0 5px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #1c1c2e;
            border-radius: 15px;
            border: 1px solid #2a2a45;
        }
        
        .roulette-item img {
            width: 90px;
            height: 90px;
            object-fit: contain;
        }
        
        .win-name-text { font-size: 32px; color: #00d4ff; margin-top: 20px; text-shadow: 0 0 15px #00d4ff; }
    </style>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <div class="live-header">
        <div class="live-status">
            <div class="live-title">LIVE DROPS</div>
            <div class="live-indicator"><div class="dot"></div> ЭФИР</div>
        </div>
        <div class="drop-tape" id="global-live-feed"></div>
    </div>

    <div id="auth-screen" class="full-screen">
        <div class="auth-card">
            <div class="auth-tabs">
                <button id="tab-btn-login" class="active" onclick="switchAuthMode('login')">ВХОД</button>
                <button id="tab-btn-reg" onclick="switchAuthMode('reg')">РЕГИСТРАЦИЯ</button>
            </div>
            <div class="auth-form">
                <input type="text" id="user_name" placeholder="Никнейм">
                <input type="password" id="user_password" placeholder="Пароль">
                <button id="btn-login-action" class="neon-btn" onclick="login()">ВОЙТИ</button>
                <button id="btn-reg-action" class="neon-btn" style="display:none;" onclick="register()">СОЗДАТЬ</button>
            </div>
        </div>
    </div>

    <div id="game-interface" style="display:none;">
        <div id="page-cases" class="page active"><div id="cases-grid"></div></div>
        
        <div id="page-opening" class="page">
            <div class="roulette-container">
                <div class="roulette-wrapper">
                    <div class="selector"></div>
                    <div class="tape" id="roulette-tape"></div>
                </div>
                <div id="win-display" style="display:none;">
                    <h2 id="win-name-text" class="win-name-text"></h2>
                    <button class="neon-btn win-back-btn" onclick="navTo('cases')">ЗАКРЫТЬ КЕЙС</button>
                </div>
            </div>
        </div>

        <div id="page-profile" class="page">
            <h2 id="p-username" style="color:#00d4ff; font-size: 28px;">Загрузка...</h2>
            <p class="p-balance-display">БАЛАНС: <span id="p-balance">0</span>$</p>
            <div id="inventory-list"></div>
        </div>

        <nav class="bottom-navbar">
            <button onclick="navTo('cases')">КЕЙСЫ</button>
            <button onclick="navTo('profile')">ИНВЕНТАРЬ</button>
            <button onclick="logout()" style="color:#ff4444;">ВЫХОД</button>
        </nav>
    </div>

    <div id="notification-container"></div>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="script.js"></script>

    <div id="notification-container"></div>
</body>
</html>
