<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRAINROT CASES | OFFICIAL SITE</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <header>
        <div class="live-status">
            <span class="dot"></span>
            <span class="live-label">LIVE DROPS</span>
        </div>
        <div id="global-live-feed"></div>
    </header>

    <div id="notification-container"></div>

    <div id="auth-screen" class="full-screen">
        <div class="auth-card">
            <h1 class="logo">BRAINROT</h1>
            <div id="step-choice">
                <button class="main-btn" onclick="showAuth('reg')">РЕГИСТРАЦИЯ</button>
                <button class="main-btn btn-outline" onclick="showAuth('login')">ВХОД</button>
            </div>
            <div id="step-form" style="display:none;">
                <input type="email" id="user_email" placeholder="Ваш Email">
                <input type="password" id="user_password" placeholder="Пароль (мин. 8 символов)">
                <button id="btn-login" class="main-btn" onclick="login()">ПОДТВЕРДИТЬ</button>
                <p class="back-link" onclick="showAuth('choice')">← назад</p>
            </div>
        </div>
    </div>

    <main id="game-interface" style="display:none;">
        
        <section id="page-cases" class="page active">
            <h2 class="section-title">МАГАЗИН КЕЙСОВ</h2>
            <div id="cases-grid"></div>
        </section>

        <section id="page-opening" class="page">
            <div class="roulette-wrapper">
                <div class="selector"></div>
                <div id="roulette-tape" class="tape"></div>
            </div>
            <div id="win-display" style="display:none; text-align:center; margin-top:30px;">
                <div class="win-light"></div>
                <h2 id="win-name-text"></h2>
                <button class="main-btn" style="width: 200px;" onclick="navTo('cases')">ЗАБРАТЬ</button>
            </div>
        </section>

        <section id="page-profile" class="page">
            <div class="balance-view">
                <p>ВАШ БАЛАНС</p>
                <h2 id="p-balance">0$</h2>
            </div>
            
            <h3 class="sub-title">МОЙ ИНВЕНТАРЬ</h3>
            <div id="inventory-list"></div>

            <h3 class="sub-title">ИСТОРИЯ ВЫВОДОВ</h3>
            <div id="withdraw-history"></div>
        </section>

        <nav class="navbar">
            <button onclick="navTo('cases')" class="nav-item">КЕЙСЫ</button>
            <button onclick="navTo('profile')" class="nav-item">ПРОФИЛЬ</button>
            <button onclick="logout()" class="nav-item exit">ВЫХОД</button>
        </nav>
    </main>

    <script src="script.js"></script>
</body>
</html>
