<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brainrot Cases - LIVE</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <header>
        <div class="live-indicator">
            <span class="red-dot"></span>
            <span class="live-text">LIVE FEED</span>
        </div>
        <div id="global-live-feed"></div>
    </header>

    <main id="app">
        <section id="page-cases" class="page active">
            <h1 class="page-title">МАГАЗИН КЕЙСОВ</h1>
            <div id="cases-grid">
                </div>
        </section>

        <section id="page-profile" class="page">
            <h1 class="page-title">ВАШ ИНВЕНТАРЬ</h1>
            <div class="user-stats">
                <span id="p-balance">0</span><span class="currency">$</span>
            </div>
            <div id="inventory-list"></div>
            
            <h2 class="sub-title">ИСТОРИЯ ВЫВОДОВ</h2>
            <div id="withdraw-history"></div>
        </section>
    </main>

    <nav class="bottom-nav">
        <button onclick="navTo('cases')">КЕЙСЫ</button>
        <button onclick="navTo('profile')">ПРОФИЛЬ</button>
        <button onclick="logout()" class="exit-btn">ВЫХОД</button>
    </nav>

    <div id="notification-container"></div>
    <script src="script.js"></script>
</body>
</html>
