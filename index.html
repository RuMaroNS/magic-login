<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cyber-Realtime Cases</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="cyber-bg"><div class="grid-overlay"></div></div>

    <div class="live-wrapper">
        <div class="live-tag">LIVE DROP</div>
        <div class="live-scroll-container">
            <div id="global-live-feed" class="live-scroll-content"></div>
        </div>
    </div>

    <div id="top-bar" class="currency-panel" style="display:none;">
        <div class="currency-badge cash">$ <span id="h-balance">0</span></div>
        <div class="currency-badge cp">⚡ <span id="h-cp">0</span> CP</div>
    </div>

    <div id="auth-screen" class="full-screen">
        <div class="auth-card">
            <h1 class="glitch-text">SYSTEM<span>ACCESS</span></h1>
            <input type="text" id="user_name" placeholder="LOGIN">
            <input type="password" id="user_password" placeholder="PASSWORD">
            <button class="neon-btn-main" onclick="window.login()">INITIALIZE</button>
        </div>
    </div>

    <div id="game-interface" style="display:none;">
        <div id="page-cases" class="page active">
            <div id="cases-grid" class="main-grid"></div>
        </div>

        <div id="page-case-info" class="page">
            <div id="case-detail-hero"></div>
            <div class="loot-preview-container">
                <h3 class="sub-title">CONTENT_DATA:</h3>
                <div id="loot-chances-grid" class="loot-grid"></div>
            </div>
            <button class="back-link" onclick="window.navTo('cases')">← TERMINAL_RETURN</button>
        </div>

        <div id="page-market" class="page">
            <h2 class="section-title">LIMITED_STOCK</h2>
            <div id="limited-grid" class="main-grid"></div>
        </div>

        <div id="page-profile" class="page">
            <div class="profile-mega-card">
                <div class="p-avatar-large"></div>
                <div class="p-details">
                    <h1 id="p-username">USER_NAME</h1>
                    <div class="p-rank">SECURITY_LEVEL: 07</div>
                </div>
            </div>
            <h2 class="section-title">SECURE_STORAGE</h2>
            <div id="inventory-list" class="main-grid"></div>
        </div>

        <nav class="cyber-nav">
            <button onclick="window.navTo('cases')">CASES</button>
            <button onclick="window.navTo('market')">MARKET</button>
            <button onclick="window.navTo('profile')">PROFILE</button>
        </nav>
    </div>

    <div id="notification-container"></div>
    <script src="script.js"></script>
</body>
</html>
