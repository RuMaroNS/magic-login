<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brainrot Case Simulator</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <div id="notification-container"></div>

    <div id="auth-container">
    <div id="step-choice">
        <button onclick="showAuth('reg')">Регистрация</button>
        <button onclick="showAuth('login')">Вход</button>
    </div>
    <div id="step-form" style="display:none;">
        <input type="email" id="user_email" placeholder="Email"><br>
        <input type="password" id="user_password" placeholder="Пароль"><br>
        <button id="btn-reg" onclick="sendOTP()" style="display:none;">Получить код</button>
        <button id="btn-login" onclick="login()" style="display:none;">Войти</button>
    </div>
    <div id="step-code" style="display:none;">
        <input type="number" id="otp_input" placeholder="Код"><br>
        <button onclick="register()">ОК</button>
    </div>
</div>

<div id="game-ui" style="display:none;">
    <nav>
        <button onclick="switchTab('cases')">Кейсы</button>
        <button onclick="switchTab('profile')">Профиль</button>
        <button onclick="switchTab('support')">Поддержка</button>
        <button onclick="logout()" style="background:#ff4444;">Выход</button>
    </nav>
    <div id="tab-cases" class="tab">
        <div id="case-display">🎁</div>
        <button onclick="openCase()">Крутить за 50$</button>
    </div>
    <div id="tab-profile" class="tab" style="display:none;">
        <p>Баланс: <span id="p-balance"></span>$</p>
        <div id="inventory-list"></div>
    </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
