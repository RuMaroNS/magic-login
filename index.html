<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Magic Login & Save</title>
    <link rel="stylesheet" href="style.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <div class="login-card">
        <div id="step-1">
            <h2>Вход в игру</h2>
            <input type="email" id="user_email" placeholder="Твоя почта">
            <button onclick="sendOTP()">Получить код</button>
        </div>

        <div id="step-2" style="display: none;">
            <h2>Введите код</h2>
            <input type="text" id="otp_input" placeholder="0000" maxlength="4">
            <button onclick="verifyOTP()">Войти и загрузить прогресс</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
