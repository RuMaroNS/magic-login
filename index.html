<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cyber Magic Cases</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="cyber-bg">
        <div class="grid-overlay"></div>
        <div class="scanlines"></div>
    </div>

    <div id="notification-container"></div>

    <div class="live-header">
        <div class="live-tag">LIVE</div>
        <div id="global-live-feed" class="live-track"></div>
    </div>

    <div id="top-bar" class="currency-panel" style="display:none;">
        <div class="currency-badge cash">$ <span id="h-balance">0</span></div>
        <div class="currency-badge cp">⚡ <span id="h-cp">0</span> CP</div>
    </div>

    <div id="auth-screen" class="full-screen">
        <div class="auth-card">
            <h1 class="glitch-text">SYSTEM_LOGIN</h1>
            <div class="input-group">
                <input type="text" id="user_name" autocomplete="username" placeholder="OPERATOR_ID">
                <input type="password" id="user_password" autocomplete="current-password" placeholder="ACCESS_KEY">
            </div>
            <button class="neon-btn-main" onclick="window.login()">INITIALIZE</button>
        </div>
    </div>

    <div id="game-interface" style="display:none;">
        <div id="page-cases" class="page active">
            <h2 class="section-title">ACTIVE_CAPSULES</h2>
            <div id="cases-grid" class="main-grid"></div>
        </div>

        <div id="page-case-info" class="page">
            <div id="case-detail-content"></div>
            <button class="back-btn" onclick="window.navTo('cases')">← TERMINATE_VIEW</button>
        </div>

        <div id="page-market" class="page">
            <h2 class="section-title">LIMITED_HARDWARE</h2>
            <div id="limited-grid" class="main-grid"></div>
        </div>

        <div id="page-profile" class="page">
            <div class="profile-header">
                <div class="p-avatar"></div>
                <div class="p-info">
                    <h2 id="p-username">USER</h2>
                    <span class="p-rank">SECURITY_LEVEL: 07</span>
                </div>
            </div>
            <div id="inventory-list" class="main-grid"></div>
        </div>

        <nav class="cyber-nav">
            <button onclick="window.navTo('cases')">CASES</button>
            <button onclick="window.navTo('market')">MARKET</button>
            <button onclick="window.navTo('profile')">PROFILE</button>
        </nav>
    </div>

    <script src="script.js"></script>
</body>
</html>
