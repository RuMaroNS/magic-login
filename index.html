<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Твоя Игра - Авторизация</title>
    
    <link rel="stylesheet" href="style.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
</head>
<body>

    <div id="auth-container">
        <div id="step-choice">
            <h1>БРАЙНРОТ ГЕЙМС</h1>
            <p>Выбери действие:</p>
            <button class="main-btn" onclick="showAuth('reg')">Создать аккаунт</button>
            <button class="main-btn" onclick="showAuth('login')">Войти</button>
        </div>

        <div id="step-form" style="display:none;">
            <h2 id="auth-title">Регистрация</h2>
            <div class="input-group">
                <input type="email" id="user_email" placeholder="Твой Email" required>
                <input type="password" id="user_password" placeholder="Пароль" required>
            </div>
            
            <button id="btn-reg" class="action-btn" onclick="sendOTP()" style="display:none;">Получить код</button>
            <button id="btn-login" class="action-btn" onclick="login()" style="display:none;">Войти в игру</button>
            
            <span class="back-link" onclick="showAuth('choice')">← Назад</span>
        </div>

        <div id="step-code" style="display:none;">
            <h2>Код подтверждения</h2>
            <p>Мы отправили цифры тебе на почту</p>
            <input type="number" id="otp_input" placeholder="0000" class="code-input">
            <button class="action-btn" onclick="register()">Завершить регистрацию</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
