<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brainrot Case Simulator Pro</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
</head>
<body>

    <div id="notification-container"></div>

    <div class="main-wrapper">
        <div class="content-box">
            <div id="auth-container">
                <h1 class="logo">BRAINROT</h1>
                
                <div id="step-choice">
                    <button class="main-btn" onclick="showAuth('reg')">РЕГИСТРАЦИЯ</button>
                    <button class="main-btn btn-outline" onclick="showAuth('login')">ВХОД</button>
                </div>

                <div id="step-form" style="display:none;">
                    <div class="input-group">
                        <input type="email" id="user_email" placeholder="email@example.com">
                        <input type="password" id="user_password" placeholder="Пароль (мин. 8 символов)">
                    </div>
                    <button id="btn-reg" class="main-btn" onclick="sendOTP()" style="display:none;">ПОЛУЧИТЬ КОД</button>
                    <button id="btn-login" class="main-btn" onclick="login()" style="display:none;">ВОЙТИ</button>
                    <p class="back-link" onclick="showAuth('choice')">← Назад</p>
                </div>

                <div id="step-code" style="display:none;">
                    <p class="otp-text">Код отправлен в Telegram / Почту</p>
                    <input type="number" id="otp_input" placeholder="0000">
                    <button class="main-btn" onclick="register()">ПОДТВЕРДИТЬ</button>
                </div>
            </div>

            <div id="game-ui" style="display:none;">
                <nav>
                    <button onclick="switchTab('cases')">КЕЙСЫ</button>
                    <button onclick="switchTab('profile')">ПРОФИЛЬ</button>
                    <button onclick="switchTab('support')">САППОРТ</button>
                    <button onclick="logout()" class="logout-btn">ВЫХОД</button>
                </nav>

                <div id="tab-cases" class="tab">
                    <div id="case-display">🎁</div>
                    <button class="main-btn open-btn" onclick="openCase()">ОТКРЫТЬ ЗА 50$</button>
                </div>

                <div id="tab-profile" class="tab" style="display:none;">
                    <div class="balance-card">БАЛАНС: <span id="p-balance">0</span>$</div>
                    <div id="inventory-list"></div>
                </div>

                <div id="tab-support" class="tab" style="display:none;">
                    <h3 class="title">ПОДДЕРЖКА</h3>
                    <textarea id="support-msg" placeholder="Опишите проблему..."></textarea>
                    <button class="main-btn" onclick="sendSupport()">ОТПРАВИТЬ</button>
                </div>
            </div>
        </div>

        <div class="live-section">
            <div class="live-board-container">
                <div class="live-title"><span class="dot"></span> LIVE DROPS</div>
                <div id="drops-feed"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>

    <div id="game-ui" style="display:none;">
        <nav>
            <button onclick="switchTab('cases')">КЕЙСЫ</button>
            <button onclick="switchTab('profile')">ПРОФИЛЬ</button>
            <button onclick="switchTab('support')">САППОРТ</button>
            <button onclick="logout()" class="logout-btn">X</button>
        </nav>

        <div id="tab-cases" class="tab">
            <div id="case-display">🎁</div>
            <button class="main-btn" onclick="openCase()">КРУТИТЬ (50$)</button>
        </div>

        <div id="tab-profile" class="tab" style="display:none;">
            <div class="balance-card">
                БАЛАНС: <span id="p-balance">0</span>$
            </div>
            <h3 class="title">ИНВЕНТАРЬ:</h3>
            <div id="inventory-list"></div>
        </div>

        <div id="tab-support" class="tab" style="display:none;">
            <h3 class="title">ТЕХПОДДЕРЖКА</h3>
            <textarea id="support-msg" placeholder="Ник в Roblox и суть проблемы..."></textarea>
            <button class="main-btn" onclick="sendSupport()">ОТПРАВИТЬ</button>
        </div>
    </div>

    <div class="live-board-container">
        <div class="live-title"><span class="dot"></span> LIVE DROPS</div>
        <div id="drops-feed"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
