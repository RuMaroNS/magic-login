<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cyber Magic Cases</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="cyber-bg">
        <div class="grid-overlay"></div>
        <div class="scanlines"></div>
    </div>

    <div id="notification-container"></div>

    <div class="live-header">
        <div class="live-tag">LIVE</div>
        <div id="global-live-feed" class="live-track">UPDATE 0.13.0 IS NOW :3</div>
    </div>

    <div id="top-bar" class="currency-panel" style="display:none;">
        <div class="currency-badge cash">$ <span id="h-balance">0</span></div>
        <div class="currency-badge cp">⚡ <span id="h-cp">0</span> CP</div>
    </div>

    <div id="auth-screen" class="full-screen">
        <div class="auth-card">
            <h1 class="glitch-text">SYSTEM_LOGIN</h1>
            <div class="input-group">
                <input type="text" id="user_name" autocomplete="username" placeholder="OPERATOR_ID">
                <input type="password" id="user_password" autocomplete="current-password" placeholder="ACCESS_KEY">
            </div>
            <button class="neon-btn-main" onclick="window.login()">INITIALIZE</button>
        </div>
    </div>

    <div id="game-interface" style="display:none;">
        <div id="page-cases" class="page active">
            <h2 class="section-title">ACTIVE_CAPSULES</h2>
            <div id="cases-grid" class="main-grid"></div>
        </div>

        <div id="page-case-info" class="page">
            <div id="case-detail-content"></div>
            <button class="back-btn" onclick="window.navTo('cases')">← TERMINATE_VIEW</button>
        </div>

        <div id="page-market" class="page">
            <h2 class="section-title">LIMITED_HARDWARE</h2>
            <div id="limited-grid" class="main-grid"></div>
        </div>

        <div id="page-profile" class="page">
            <div class="profile-container">
                <div class="user-card">
                    <div class="card-header">
                        <div class="user-avatar"><div class="avatar-glow"></div></div>
                        <div class="user-main-info">
                            <h2 id="p-username">LOADING...</h2>
                            <div class="status-badge"><span class="pulse-dot"></span> SYSTEM_ONLINE</div>
                        </div>
                    </div>
                    <div class="card-stats">
                        <div class="stat-box">
                            <span class="label">CREDITS</span>
                            <span class="value">$<span id="p-worth">0</span></span>
                        </div>
                        <div class="stat-box">
                            <span class="label">CYBER_POINTS</span>
                            <span class="value">⚡<span id="p-cp-val">0</span></span>
                        </div>
                    </div>
                </div>
                <div class="inventory-section">
                    <div class="inventory-header">
                        <span class="line"></span>
                        <h3>SECURE_STORAGE</h3>
                        <span class="line"></span>
                    </div>
                    <div id="inventory-list" class="main-grid"></div>
                </div>
            </div>
        </div>

        <nav class="cyber-nav">
            <button onclick="window.navTo('cases')">CASES</button>
            <button onclick="window.navTo('market')">MARKET</button>
            <button onclick="window.navTo('profile')">PROFILE</button>
        </nav>
    </div>

    <!-- ОВЕРЛЕЙ РУЛЕТКИ -->
    <div id="roulette-overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.98); z-index:10000; backdrop-filter:blur(8px);">
        <div class="roulette-container">
            <div class="roulette-header">
                <span class="roulette-title">🔓 INITIALIZING CASE</span>
                <span class="roulette-loader">LOADING...</span>
            </div>
            <div class="roulette-window">
                <div class="roulette-track" id="rouletteTrack"></div>
                <div class="roulette-pointer">▼</div>
            </div>
            <div class="roulette-result" id="rouletteResult">
                <span class="result-icon">🎲</span>
                <span class="result-text">ROLLING...</span>
            </div>
            <div class="roulette-progress">
                <div class="progress-bar" id="rouletteProgress"></div>
            </div>
        </div>
    </div>

    <template id="inv-item-template">
        <div class="mega-card inv-item">
            <img class="item-img" src="">
            <h4 class="item-name"></h4>
            <div class="inv-btns">
                <button class="sell-btn">SELL</button>
                <button class="with-btn">WITHDRAW</button>
            </div>
            <div class="item-status-text" style="display:none; font-size: 10px; color: #ffaa00; margin-top: 5px;">ON_REQUEST...</div>
        </div>
    </template>

    <script src="script.js"></script>
</body>
</html>
