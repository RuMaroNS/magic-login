<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magic Cases | LIVE</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <div class="live-header">
        <div class="live-status">
            <div class="live-title">LIVE</div>
            <div class="live-title">DROPS</div>
            <div class="live-indicator">
                <div class="dot"></div> ЭФИР
            </div>
        </div>
        <div class="drop-tape" id="global-live-feed"></div>
    </div>

    <div id="auth-screen" class="full-screen">
        <div class="auth-card">
            <div class="auth-form">
                <h2 style="text-align:center; color:#00d4ff; margin-bottom:20px;">ВХОД В СИСТЕМУ</h2>
                <input type="text" id="login-username" placeholder="Ваш никнейм">
                <button class="neon-btn" onclick="simpleLogin()">НАЧАТЬ ИГРУ</button>
            </div>
        </div>
    </div>

    <div id="game-interface" style="display:none;">
        
        <div id="page-cases" class="page active">
            <div id="cases-grid"></div>
        </div>

        <div id="page-opening" class="page">
            <div class="roulette-wrapper">
                <div class="selector"></div>
                <div class="tape" id="roulette-tape"></div>
            </div>
            <div id="win-display" style="display:none; text-align:center;">
                <h2 id="win-name-text" style="color:#00d4ff; font-size: 24px;"></h2>
                <button class="neon-btn" style="width:220px; margin-top:20px;" onclick="navTo('cases')">К КЕЙСАМ</button>
            </div>
        </div>

        <div id="page-profile" class="page">
            <h2 id="p-username" style="font-size: 28px; color: #00d4ff;"></h2>
            <p style="color:#2ecc71; font-size:22px; margin:15px 0; font-weight: bold;">
                БАЛАНС: <span id="p-balance">0</span>$
            </p>
            <div id="inventory-list"></div>
        </div>

        <nav class="bottom-navbar">
            <button onclick="navTo('cases')">МАГАЗИН</button>
            <button onclick="navTo('profile')">ИНВЕНТАРЬ</button>
            <button onclick="location.reload()" style="color:#ff4444;">ВЫЙТИ</button>
        </nav>
    </div>

    <div id="notification-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
