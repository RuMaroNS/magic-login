<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Magic Cases | Premium</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <div id="notification-container"></div>

    <div class="live-header">
        <div class="live-status">
            <div class="live-title">LIVE</div>
            <div class="live-indicator"><div class="dot"></div></div>
        </div>
        <div class="drop-tape" id="global-live-feed"></div>
    </div>

    <div id="auth-screen" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #05050a; z-index: 10000; display: flex; align-items: center; justify-content: center;">
        <div class="auth-card" style="background: #0f0f1e; padding: 30px; border-radius: 20px; border: 1px solid #2a2a45; width: 90%; max-width: 400px; text-align: center;">
            <div class="auth-tabs" style="display: flex; gap: 10px; margin-bottom: 20px;">
                <button id="tab-btn-login" class="neon-btn active" onclick="switchAuthMode('login')" style="flex:1">ВХОД</button>
                <button id="tab-btn-reg" class="neon-btn" onclick="switchAuthMode('reg')" style="flex:1">РЕГА</button>
            </div>
            <input type="text" id="user_name" placeholder="Никнейм">
            <input type="password" id="user_password" placeholder="Пароль">
            <button id="btn-login-action" class="neon-btn" onclick="login()">ВОЙТИ</button>
            <button id="btn-reg-action" class="neon-btn" style="display:none;" onclick="register()">СОЗДАТЬ</button>
        </div>
    </div>

    <div id="game-interface" style="display:none; position: relative; z-index: 100;">
        
        <div id="page-cases" class="page active">
            <div id="cases-grid"></div>
        </div>
        
        <div id="page-opening" class="page">
            <div class="roulette-container">
                <div class="roulette-wrapper">
                    <div class="tape" id="roulette-tape"></div>
                </div>
                <div id="win-display" style="display:none; text-align: center; margin-top: 20px;">
                    <h2 id="win-name-text" style="color:#00d4ff; margin-bottom: 20px;"></h2>
                    <button class="neon-btn" style="width: 220px; margin: 0 auto;" onclick="navTo('cases')">ВЕРНУТЬСЯ</button>
                </div>
            </div>
        </div>

        <div id="page-profile" class="page">
            <div class="profile-info" style="text-align:center; margin-bottom: 30px;">
                <h2 id="p-username" style="color:#00d4ff;"></h2>
                <p style="color:#2ecc71; font-size: 20px; font-weight: bold;">$ <span id="p-balance">0</span></p>
            </div>
            <div id="inventory-list"></div>
        </div>

        <nav class="bottom-navbar">
            <button id="nav-cases" onclick="navTo('cases')">КЕЙСЫ</button>
            <button id="nav-profile" onclick="navTo('profile')">ПРОФИЛЬ</button>
            <button onclick="logout()" style="color:#ff4444;">ВЫХОД</button>
        </nav>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
